<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --black:    #0a0a0a;
    --deep:     #111111;
    --panel:    #1a1a1a;
    --border:   #2a2a2a;
    --orange:   #ff6600;
    --orange2:  #ff8c00;
    --orange-glow: rgba(255,102,0,0.35);
    --text:     #f0f0f0;
    --muted:    #555;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--black);
    font-family: 'Share Tech Mono', monospace;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, #1c1c1c 39px, #1c1c1c 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #1c1c1c 39px, #1c1c1c 40px);
  }

  .calc-wrapper {
    position: relative;
  }

  /* Glow halo behind the calc */
  .calc-wrapper::before {
    content: '';
    position: absolute;
    inset: -30px;
    background: radial-gradient(ellipse at center, var(--orange-glow) 0%, transparent 70%);
    border-radius: 28px;
    z-index: 0;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.04); }
  }

  .calculator {
    position: relative;
    z-index: 1;
    background: var(--deep);
    border: 1px solid #2e2e2e;
    border-radius: 16px;
    padding: 24px;
    width: 340px;
    box-shadow:
      0 0 0 1px #000,
      inset 0 1px 0 #2a2a2a,
      0 30px 80px rgba(0,0,0,0.8);
  }

  /* Brand strip */
  .brand {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .brand-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--orange);
    text-shadow: 0 0 12px var(--orange-glow);
  }
  .brand-dots {
    display: flex; gap: 5px;
  }
  .brand-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }
  .brand-dots span:first-child { background: var(--orange); }

  /* Display */
  .display {
    background: #0d0d0d;
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: 16px 18px 12px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .display::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
    opacity: 0.5;
  }
  .expression {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    min-height: 18px;
    letter-spacing: 1px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result {
    font-size: 42px;
    color: var(--text);
    text-align: right;
    letter-spacing: 2px;
    line-height: 1.1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: color 0.15s;
  }
  .result.error { color: #ff4444; font-size: 22px; }
  .result.computed { color: var(--orange); }

  /* Buttons grid */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  button {
    position: relative;
    height: 64px;
    border: none;
    border-radius: 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 17px;
    cursor: pointer;
    outline: none;
    transition: transform 0.08s, box-shadow 0.08s, filter 0.08s;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.12s;
    border-radius: inherit;
  }
  button:active::after { background: rgba(255,255,255,0.08); }

  /* Ripple */
  button .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transform: scale(0);
    animation: ripple-anim 0.4s linear;
    pointer-events: none;
  }
  @keyframes ripple-anim {
    to { transform: scale(4); opacity: 0; }
  }

  /* Number / misc buttons */
  .btn-num {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    box-shadow: 0 4px 0 #0d0d0d, inset 0 1px 0 #2f2f2f;
  }
  .btn-num:hover  { filter: brightness(1.2); }
  .btn-num:active { transform: translateY(2px); box-shadow: 0 2px 0 #0d0d0d; }

  /* Operator buttons */
  .btn-op {
    background: linear-gradient(145deg, #1e1e1e, #151515);
    color: var(--orange);
    border: 1px solid #2a2a2a;
    box-shadow: 0 4px 0 #0a0a0a, inset 0 1px 0 #252525;
    font-size: 20px;
  }
  .btn-op:hover  { filter: brightness(1.25); color: var(--orange2); }
  .btn-op:active { transform: translateY(2px); box-shadow: 0 2px 0 #0a0a0a; }

  /* Equals */
  .btn-eq {
    background: linear-gradient(145deg, var(--orange), #e05500);
    color: #000;
    font-size: 22px;
    font-weight: bold;
    border: 1px solid #ff7722;
    box-shadow: 0 4px 0 #a33300, 0 0 20px var(--orange-glow), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn-eq:hover  { background: linear-gradient(145deg, var(--orange2), var(--orange)); }
  .btn-eq:active { transform: translateY(3px); box-shadow: 0 1px 0 #a33300; }

  /* AC / special */
  .btn-ac {
    background: linear-gradient(145deg, #1e1e1e, #121212);
    color: #ff4444;
    border: 1px solid #2a2a2a;
    box-shadow: 0 4px 0 #0a0a0a, inset 0 1px 0 #252525;
    letter-spacing: 1px;
  }
  .btn-ac:hover  { filter: brightness(1.3); }
  .btn-ac:active { transform: translateY(2px); box-shadow: 0 2px 0 #0a0a0a; }

  /* Wide button (0 spans 2 cols) */
  .btn-wide { grid-column: span 2; }

  /* Separator line between display & buttons */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 0 20px;
  }

  /* Footer */
  .footer {
    margin-top: 18px;
    display: flex;
    justify-content: center;
    gap: 8px;
    align-items: center;
  }
  .footer span {
    width: 28px; height: 2px;
    background: var(--border);
    border-radius: 2px;
  }
  .footer span:nth-child(2) {
    background: var(--orange);
    width: 14px;
  }
</style>
</head>
<body>

<div class="calc-wrapper">
  <div class="calculator">
    <div class="brand">
      <div class="brand-name">CALCX</div>
      <div class="brand-dots"><span></span><span></span><span></span></div>
    </div>

    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="divider"></div>

    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn-ac"  data-action="ac">AC</button>
      <button class="btn-op"  data-action="sign">±</button>
      <button class="btn-op"  data-action="percent">%</button>
      <button class="btn-op"  data-action="op" data-val="/">÷</button>
      <!-- Row 2 -->
      <button class="btn-num" data-action="num" data-val="7">7</button>
      <button class="btn-num" data-action="num" data-val="8">8</button>
      <button class="btn-num" data-action="num" data-val="9">9</button>
      <button class="btn-op"  data-action="op" data-val="*">×</button>
      <!-- Row 3 -->
      <button class="btn-num" data-action="num" data-val="4">4</button>
      <button class="btn-num" data-action="num" data-val="5">5</button>
      <button class="btn-num" data-action="num" data-val="6">6</button>
      <button class="btn-op"  data-action="op" data-val="-">−</button>
      <!-- Row 4 -->
      <button class="btn-num" data-action="num" data-val="1">1</button>
      <button class="btn-num" data-action="num" data-val="2">2</button>
      <button class="btn-num" data-action="num" data-val="3">3</button>
      <button class="btn-op"  data-action="op" data-val="+">+</button>
      <!-- Row 5 -->
      <button class="btn-num btn-wide" data-action="num" data-val="0">0</button>
      <button class="btn-num" data-action="decimal">.</button>
      <button class="btn-eq"  data-action="equals">=</button>
    </div>

    <div class="footer">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<script>
  const resultEl    = document.getElementById('result');
  const expressionEl = document.getElementById('expression');

  let current   = '0';
  let previous  = '';
  let operator  = null;
  let freshStart = false;  // true right after pressing = or an operator

  function formatNum(n) {
    const s = parseFloat(n.toPrecision(10)).toString();
    if (s.includes('e')) return parseFloat(n.toPrecision(6)).toExponential(3);
    const parts = s.split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return parts.join('.');
  }

  function updateDisplay(opts = {}) {
    const num = parseFloat(current);
    if (opts.error) {
      resultEl.textContent = 'Error';
      resultEl.className = 'result error';
    } else {
      resultEl.textContent = isNaN(num) ? current : formatNum(num);
      resultEl.className = opts.computed ? 'result computed' : 'result';
    }

    if (operator && previous !== '') {
      const opSym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[operator] || operator;
      expressionEl.textContent = formatNum(parseFloat(previous)) + ' ' + opSym;
    } else {
      expressionEl.textContent = '';
    }
  }

  function handleAction(action, val) {
    switch (action) {

      case 'num':
        if (freshStart) { current = val; freshStart = false; }
        else current = current === '0' ? val : current + val;
        if (current.length > 12) return; // cap input length
        updateDisplay();
        break;

      case 'decimal':
        if (freshStart) { current = '0.'; freshStart = false; }
        else if (!current.includes('.')) current += '.';
        updateDisplay();
        break;

      case 'op':
        if (operator && !freshStart) compute(false);
        previous = current;
        operator = val;
        freshStart = true;
        updateDisplay();
        break;

      case 'equals':
        if (!operator) return;
        compute(true);
        operator = null;
        previous = '';
        break;

      case 'ac':
        current = '0'; previous = ''; operator = null; freshStart = false;
        updateDisplay();
        break;

      case 'sign':
        current = (parseFloat(current) * -1).toString();
        updateDisplay();
        break;

      case 'percent':
        current = (parseFloat(current) / 100).toString();
        updateDisplay();
        break;
    }
  }

  function compute(final) {
    const a = parseFloat(previous);
    const b = parseFloat(current);
    let res;
    switch (operator) {
      case '+': res = a + b; break;
      case '-': res = a - b; break;
      case '*': res = a * b; break;
      case '/':
        if (b === 0) { updateDisplay({ error: true }); freshStart = true; return; }
        res = a / b; break;
      default: return;
    }
    current = res.toString();
    freshStart = final;
    updateDisplay({ computed: final });
  }

  // Button clicks
  document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', e => {
      handleAction(btn.dataset.action, btn.dataset.val);
      // Ripple effect
      const r = document.createElement('span');
      r.className = 'ripple';
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      btn.appendChild(r);
      setTimeout(() => r.remove(), 400);
    });
  });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if ('0123456789'.includes(e.key))   handleAction('num', e.key);
    else if (e.key === '.')             handleAction('decimal');
    else if (['+','-','*','/'].includes(e.key)) handleAction('op', e.key);
    else if (e.key === 'Enter' || e.key === '=') handleAction('equals');
    else if (e.key === 'Escape')        handleAction('ac');
    else if (e.key === 'Backspace') {
      if (current.length > 1) current = current.slice(0,-1);
      else current = '0';
      updateDisplay();
    }
  });
</script>
</body>
</html>
